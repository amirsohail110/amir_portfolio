  <style>
    /* Warm ivory loading canvas so first paint matches the app, not white flash */
    body { margin: 0; background-color: #F7F4EE; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background-color: #F7F4EE;
    }
    #loading .mark {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #C79A4E, #9C6B3F);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: Georgia, serif; font-weight: 600; font-size: 18px;
      animation: pulse 1.4s ease-in-out infinite;
